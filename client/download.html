        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"

            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="container fixed-top">
            <header
                class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 border-bottom bg-white"
            >
                <a
                    href="/"
                    class="d-flex align-items-center col-md-3 mb-2 mb-md-0 text-dark text-decoration-none"
                >
                    <img
                        src="images/chrome.svg"
                        alt="Chrome"
                        width="40"
                        height="32"
                    />
                </a>

                <ul
                    class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0"
                >
                    <li>
                        <a href="home.html#home" class="nav-link px-2 link-dark"
                            >Home</a
                        >
                    </li>
                    <li>
                        <a
                            href="home.html#features"
                            class="nav-link px-2 link-dark"
                            >Features</a
                        >
                    </li>
                    <li>
                        <a href="download.html" class="nav-link px-2 link-dark"
                            >Download</a
                        >
                    </li>
                    <li>
                        <a href="#" class="nav-link px-2 link-dark">FAQs</a>
                    </li>
                    <li>
                        <a href="#" class="nav-link px-2 link-dark">About</a>
                    </li>
                </ul>

                <div class="col-md-3 text-end">
                    <button type="button" class="btn btn-outline-primary me-2">
                        Login
                    </button>
                    <button type="button" class="btn btn-primary me-2">
                        Sign-up
                    </button>
                    <div class="dropdown d-inline-block d-none">
                        <button
                            class="btn p-0 border-0 bg-transparent"
                            type="button"
                            id="dropdownMenuButton"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="color: rgb(0, 0, 0)"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="30"
                                height="30"
                                fill="currentColor"
                                class="bi bi-person-circle"
                                viewBox="0 0 16 16"
                            >
                                <path
                                    d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"
                                ></path>
                                <path
                                    fill-rule="evenodd"
                                    d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 
               4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"
                                ></path>
                            </svg>
                        </button>
                        <ul
                            class="dropdown-menu"
                            aria-labelledby="dropdownMenuButton"
                        >
                            <li>
                                <a class="dropdown-item" href="#">Профиль</a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#">Настройки</a>
                            </li>
                            <li><a class="dropdown-item" href="#">Выход</a></li>
                        </ul>
                    </div>
                </div>
            </header>
        </div>
        <main>
            <div class="container col-xxl-8 px-4 py-5">
                <div
                    class="row flex-lg-row-reverse align-items-center g-5 py-5"
                >
                    <div class="col-10 col-sm-8 col-lg-6">
                        <img
                            src="images/chrome_new_tab.png"
                            class="d-block mx-lg-auto img-fluid"
                            alt="Chrome"
                            width="700"
                            height="500"
                            loading="lazy"
                        />
                    </div>
                    <div class="col-lg-6">
                        <h1
                            class="display-5 fw-bold text-body-emphasis lh-1 mb-3"
                        >
                            Browse as you like
                        </h1>
                        <div class="d-flex">
                            <p class="lead">
                                Start your journey by selecting OS and clicking
                                Download button
                            </p>
                            <select
                                id="osSelect"
                                class="form-select w-auto mb-3 btn-outline-primary"
                            >
                                <option selected disabled>Select OS</option>
                                <option value="windows">Windows</option>
                                <option value="linux">Linux</option>
                                <option value="macos">macOS</option>
                            </select>
                        </div>
                        <hr />
                        <div
                            class="d-grid gap-2 d-md-flex justify-content-md-start"
                        >
                            <button
                                type="button"
                                class="btn btn-primary btn-lg px-4 me-md-2"
                            >
                                Download
                            </button>
                            <button
                                type="button"
                                class="btn btn-outline-secondary btn-lg px-4"
                            >
                                See other versions
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <div class="container">
            <footer
                class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"
            >
                <p class="col-md-4 mb-0 text-body-secondary">
                    <img
                        src="images/chrome.svg"
                        alt="Chrome"
                        width="40"
                        height="32"
                    />
                    © 2025 Google, Inc. 90% of rights reserved.
                </p>
                <ul class="nav col-md-4 justify-content-end">
                    <li class="nav-item">
                        <a href="home.html#home" class="nav-link px-2 link-dark"
                            >Home</a
                        >
                    </li>
                    <li class="nav-item">
                        <a
                            href="home.html#features"
                            class="nav-link px-2 link-dark"
                            >Features</a
                        >
                    </li>
                    <li class="nav-item">
                        <a
                            href="download.html"
                            class="nav-link px-2 text-body-secondary"
                            >Dowload</a
                        >
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link px-2 text-body-secondary"
                            >FAQs</a
                        >
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link px-2 text-body-secondary"
                            >About</a
                        >
                    </li>
                </ul>
            </footer>

            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>

</html>
